name: agroapp
description: App de compra/venta de productos agrícolas
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # Provider
  provider: ^6.1.2

  # Supabase
  supabase_flutter: ^2.5.0

  # Navegación
  go_router: ^13.2.0

  # Variables de entorno (.env)
  flutter_dotenv: ^5.1.0

  # WhatsApp
  url_launcher: ^6.2.6

  # Excel export
  excel: ^4.0.2

  # Guardar archivos
  path_provider: ^2.1.3
  share_plus: ^9.0.0

  # UI útil
  intl: ^0.19.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#1B5E20"
  image: "assets/images/app_icon.png"
  android_12:
    image: "assets/images/app_icon.png"
    icon_background_color: "#1B5E20"