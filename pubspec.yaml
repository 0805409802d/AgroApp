name: agroapp
description: App de compra/venta de productos agrícolas
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Provider
  provider: ^6.1.2

  # Supabase
  supabase_flutter: ^2.5.0

  # Navegación
  go_router: ^13.2.0

  # Variables de entorno (.env)
  flutter_dotenv: ^5.1.0

  # WhatsApp
  url_launcher: ^6.2.6

  # Excel export
  excel: ^4.0.2

  # Guardar archivos
  path_provider: ^2.1.3
  share_plus: ^9.0.0

  # UI útil
  intl: ^0.19.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env